services:
  logto:
    depends_on:
      logto-postgres:
        condition: service_healthy
    image: svhd/logto:${LOGTO_TAG:-latest}
    entrypoint: ["sh", "-c", "npm run cli db seed -- --swe && npm start"]
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      - TRUST_PROXY_HEADER=1
      - DB_URL=${LOGTO_DB_URL:-postgres://postgres:p0stgr3s@logto-postgres:5432/logto}
      - ENDPOINT=${LOGTO_ENDPOINT:-http://localhost:3001}
      - ADMIN_ENDPOINT=${LOGTO_ADMIN_ENDPOINT:-http://localhost:3002}

  logto-postgres:
    image: postgres:17-alpine
    user: postgres
    environment:
      POSTGRES_USER: ${LOGTO_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${LOGTO_POSTGRES_PASSWORD:-p0stgr3s}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 5
